<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="leather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c3d2e"/>
      <stop offset="100%" style="stop-color:#3d2b1f"/>
    </linearGradient>
    <linearGradient id="pages" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4e8c1"/>
      <stop offset="100%" style="stop-color:#e8d5a3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#a08030"/>
    </linearGradient>
  </defs>
  
  <!-- Book cover -->
  <rect x="3" y="3" width="26" height="27" rx="2" fill="url(#leather)" stroke="#2a1f1a" stroke-width="1"/>
  
  <!-- Book spine -->
  <rect x="3" y="3" width="5" height="27" rx="1" fill="#2a1f1a"/>
  <line x1="5.5" y1="6" x2="5.5" y2="27" stroke="#c5a55a" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Pages edge -->
  <rect x="8" y="5" width="19" height="23" rx="1" fill="url(#pages)"/>
  
  <!-- Page lines (text simulation) -->
  <rect x="11" y="9" width="12" height="1.5" rx="0.5" fill="#2c1810" opacity="0.2"/>
  <rect x="11" y="13" width="14" height="1.5" rx="0.5" fill="#2c1810" opacity="0.2"/>
  <rect x="11" y="17" width="10" height="1.5" rx="0.5" fill="#2c1810" opacity="0.2"/>
  <rect x="11" y="21" width="13" height="1.5" rx="0.5" fill="#2c1810" opacity="0.2"/>
  
  <!-- Gold corner ornament -->
  <path d="M24 5 L27 5 L27 8" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <path d="M24 28 L27 28 L27 25" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  
  <!-- Bookmark ribbon -->
  <path d="M20 3 L20 10 L22 8 L24 10 L24 3" fill="#8b0000"/>
</svg>
